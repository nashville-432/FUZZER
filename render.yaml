services:
  - type: web
    name: fuzzer-app
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/fuzzer.db
    disk:
      name: fuzzer-db
      mountPath: /data
      sizeGB: 1
